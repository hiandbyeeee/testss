<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.1 Travel Vocabulary Flashcards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }

        .flashcard-container {
            width: 350px;
            height: 450px;
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            background-color: white;
            text-align: center;
        }

        .card-front {
            background-color: #ffffff;
            border: 4px solid #4CAF50;
        }

        .card-back {
            background-color: #e8f5e9;
            transform: rotateY(180deg);
            border: 4px solid #388E3C;
        }

        .speaker-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .speaker-btn:hover {
            transform: scale(1.2);
        }

        .picture {
            font-size: 100px;
            margin-bottom: 20px;
        }

        .word-en {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .word-zh {
            font-size: 40px;
            font-weight: bold;
            color: #d35400;
        }

        .hint {
            font-size: 14px;
            color: #7f8c8d;
            position: absolute;
            bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button.nav-btn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.nav-btn:hover {
            background-color: #2980b9;
        }

        button.nav-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .counter {
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>🌍 F.1 Travel Vocabulary</h1>

    <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="card-face card-front">
                <button class="speaker-btn" onclick="playAudio(event)" title="Listen to pronunciation">🔊</button>
                <div class="picture" id="pic">🏛️</div>
                <div class="word-en" id="word-en">cultural heritage</div>
                <div class="hint">Click the card to see the meaning</div>
            </div>
            
            <div class="card-face card-back">
                <div class="word-zh" id="word-zh">文化遺產</div>
                <div class="hint">Click to flip back</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="nav-btn" id="prev-btn" onclick="prevWord()">⬅️ Back</button>
        <div class="counter" id="counter">1 / 25</div>
        <button class="nav-btn" id="next-btn" onclick="nextWord()">Next ➡️</button>
    </div>

    <script>
        // Vocabulary Data List
        const vocabList = [
            { en: "cultural heritage", zh: "文化遺產", pic: "🏛️" },
            { en: "custom", zh: "習俗", pic: "🎎" },
            { en: "destination", zh: "目的地", pic: "📍" },
            { en: "travel brochure", zh: "旅遊宣傳冊", pic: "🗺️" },
            { en: "passport", zh: "護照", pic: "🛂" },
            { en: "luggage / baggage", zh: "行李", pic: "🧳" },
            { en: "vacation", zh: "假期", pic: "🏖️" },
            { en: "itinerary", zh: "行程", pic: "🗓️" },
            { en: "excursion", zh: "短途旅行 / 遠足", pic: "🚌" },
            { en: "landscape", zh: "風景 / 景色", pic: "🏞️" },
            { en: "vibrant", zh: "充滿活力的", pic: "✨" },
            { en: "landmark", zh: "地標", pic: "🗽" },
            { en: "tourist spot", zh: "旅遊景點", pic: "📸" },
            { en: "capital", zh: "首都", pic: "🏙️" },
            { en: "nightlife", zh: "夜生活", pic: "🌃" },
            { en: "overcrowded", zh: "擠擁的", pic: "🧑‍🤝‍🧑" },
            { en: "accommodation", zh: "住宿", pic: "🏨" },
            { en: "infrastructure", zh: "基礎設施", pic: "🌉" },
            { en: "scenery", zh: "風景", pic: "🌄" },
            { en: "spectacular", zh: "壯觀的", pic: "🎆" },
            { en: "the Forbidden City", zh: "紫禁城 / 故宮", pic: "🏯" },
            { en: "Mount Fuji", zh: "富士山", pic: "🗻" },
            { en: "Sydney Opera House", zh: "悉尼歌劇院", pic: "🎭" },
            { en: "Statue of Liberty", zh: "自由神像", pic: "🗽" },
            { en: "Eiffel Tower", zh: "巴黎鐵塔", pic: "🗼" }
        ];

        let currentIndex = 0;

        // Elements
        const flashcard = document.getElementById("flashcard");
        const picEl = document.getElementById("pic");
        const wordEnEl = document.getElementById("word-en");
        const wordZhEl = document.getElementById("word-zh");
        const counterEl = document.getElementById("counter");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");

        // Load the initial card
        function loadCard(index) {
            picEl.textContent = vocabList[index].pic;
            wordEnEl.textContent = vocabList[index].en;
            wordZhEl.textContent = vocabList[index].zh;
            counterEl.textContent = `${index + 1} / ${vocabList.length}`;
            
            // Disable/Enable buttons at the ends of the list
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === vocabList.length - 1;
            
            // Ensure card always shows front when moving to a new word
            flashcard.classList.remove("is-flipped");
        }

        // Flip animation
        function flipCard() {
            flashcard.classList.toggle("is-flipped");
        }

        // Navigation
        function nextWord() {
            if (currentIndex < vocabList.length - 1) {
                currentIndex++;
                loadCard(currentIndex);
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard(currentIndex);
            }
        }

        // Text-to-Speech (Pronunciation)
        function playAudio(event) {
            // Stop the card from flipping when clicking the speaker button
            event.stopPropagation();
            
            // Get the current English word, remove the slash in luggage / baggage for reading
            let textToRead = vocabList[currentIndex].en.replace('/', 'or');
            
            if ('speechSynthesis' in window) {
                // Cancel any currently playing speech so they don't overlap
                window.speechSynthesis.cancel();
                
                let utterance = new SpeechSynthesisUtterance(textToRead);
                utterance.lang = 'en-US';
                // Set the rate slower (0.7) for weaker students to hear clearly
                utterance.rate = 0.7; 
                utterance.pitch = 1.0;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support text-to-speech.");
            }
        }

        // Initialize the first card on page load
        loadCard(currentIndex);
    </script>
</body>
</html>
